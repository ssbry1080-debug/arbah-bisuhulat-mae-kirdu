<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اربح بسهولة مع كردو عفرين</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="overlay">

        <div class="hero">

            <div class="logo">
                <img src="assets/logo.png" alt="شعار الموقع">
            </div>

            <h1>
                اربح بسهولة مع
                <span>كردو عفرين</span>
            </h1>

            <p>منصة موثوقة للربح والإحالات</p>

        </div>

        <div class="login-card">

            <h2>مرحباً بك مجدداً</h2>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="البريد الإلكتروني">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input id="password" type="password" placeholder="كلمة المرور">
                <i class="fa-solid fa-eye eye" onclick="togglePassword()"></i>
            </div>

            <div class="options">

                <label>
                    <input type="checkbox">
                    تذكرني
                </label>

                <a href="#">نسيت كلمة المرور؟</a>

            </div>

            <button class="login-btn">
                تسجيل الدخول
            </button>

            <button class="register-btn">
                إنشاء حساب جديد
            </button>

        </div>

        <div class="features">

            <div>
                <i class="fa-solid fa-shield-halved"></i>
                <p>آمن</p>
            </div>

            <div>
                <i class="fa-solid fa-headset"></i>
                <p>دعم 24/7</p>
            </div>

            <div>
                <i class="fa-solid fa-coins"></i>
                <p>أرباح يومية</p>
            </div>

        </div>

        <div class="languages">
            <button class="active">العربية</button>
            <button>کوردی</button>
        </div>

        <footer>
            © 2025 كردو عفرين - جميع الحقوق محفوظة
        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
